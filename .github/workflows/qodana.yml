# Shared Qodana CI workflow for maxi-tools repos.
# Copy to .github/workflows/qodana.yml in each repo.
#
# Requires QODANA_TOKEN secret set at org level.

name: Qodana

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: true
          use-caches: true
          post-pr-comment: true
          use-annotations: true
