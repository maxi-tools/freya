# Shared Qodana CI workflow for maxi-tools repos.
# Source of truth: maxi-config/workflows/qodana.yml
#
# Requires QODANA_TOKEN secret set at org level.

name: Qodana

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:

jobs:
  qodana:
    runs-on: [self-hosted, macOS]
    env:
      DOCKER_HOST: unix:///Users/maxi/.colima/default/docker.sock
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Setup PATH
        run: echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: true
          post-pr-comment: true
