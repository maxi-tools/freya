# Shared Qodana CI workflow for maxi-tools repos.
# Source of truth: maxi-config/workflows/qodana.yml
#
# Runs Qodana via RustRover's headless inspect mode (native Rust analysis).
# Requires RustRover 2026.1+ installed on self-hosted runners.

name: Qodana

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:

jobs:
  qodana:
    runs-on: [self-hosted, macOS]
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Setup PATH
        run: echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        run: |
          RESULTS_DIR="$RUNNER_TEMP/qodana/results"
          mkdir -p "$RESULTS_DIR"
          /Applications/RustRover.app/Contents/MacOS/rustrover inspect \
            "$(pwd)" \
            "$RESULTS_DIR" \
            --qodana \
            -v2
