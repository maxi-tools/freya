# Qodana configuration for maxi-tools
# Source of truth: maxi-config/qodana.yaml

version: "1.0"

linter: jetbrains/qodana-rust:latest

profile:
  name: qodana.recommended

exclude:
  - name: All
    paths:
      - target
      - .git
      - .maxi-worktrees
      - .claude/worktrees
      - .worktrees
      - node_modules
      - vendor
      - "**/tests/**"
      - "**/benches/**"
